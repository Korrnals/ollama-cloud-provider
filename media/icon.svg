<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Ollama Cloud Provider icon">
  <defs>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F4F4"/>
      <stop offset="100%" stop-color="#D2D2D2"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3FB950"/>
      <stop offset="100%" stop-color="#1A7F37"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2428"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (Marketplace style) -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bgGrad)"/>

  <!-- Cloud: frames the llama (centered) -->
  <path d="
    M 56 192
    C 30 192 14 176 14 156
    C 14 138 28 124 48 122
    C 52 100 76 86 104 86
    C 128 86 148 100 156 122
    C 180 122 200 138 204 160
    C 224 162 240 174 240 192
    C 240 200 234 206 226 206
    L 56 206
    C 50 206 56 198 56 192
    Z
  " fill="url(#cloudGrad)" stroke="#8B949E" stroke-width="3" stroke-linejoin="round"/>

  <!-- LLAMA: embedded image (the actual Ollama llama, scaled to fit inside cloud) -->
  <image href="llama.png" x="76" y="86" width="124" height="124" preserveAspectRatio="xMidYMid meet"/>

  <!-- Shield overlay (bottom-right, security accent) -->
  <path d="
    M 172 178
    L 172 206
    C 172 220 186 230 200 234
    C 214 230 228 220 228 206
    L 228 178
    L 200 170
    Z
  " fill="url(#shieldGrad)" stroke="#0D1117" stroke-width="3" stroke-linejoin="round"/>

  <!-- Lock body inside shield -->
  <rect x="190" y="196" width="20" height="16" rx="3" fill="#0D1117"/>
  <!-- Lock shackle -->
  <path d="M 194 196 L 194 190 C 194 186 198 183 200 183 C 202 183 206 186 206 190 L 206 196"
        fill="none" stroke="#0D1117" stroke-width="3" stroke-linecap="round"/>
  <!-- Lock keyhole -->
  <circle cx="200" cy="204" r="2" fill="#3FB950"/>
</svg>
