<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Ollama Cloud Provider icon">
  <defs>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F4F4"/>
      <stop offset="100%" stop-color="#D2D2D2"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3FB950"/>
      <stop offset="100%" stop-color="#1A7F37"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2428"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (Marketplace style) -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bgGrad)"/>

  <!-- Cloud shape: enlarged to frame the llama. Bumps top-left, top-center, top-right, right; flat bottom. -->
  <path d="
    M 64 172
    C 40 172 24 158 24 138
    C 24 120 38 108 58 106
    C 60 86 82 72 110 72
    C 132 72 152 84 160 104
    C 180 106 196 118 200 136
    C 220 138 232 150 232 166
    C 232 170 228 172 224 172
    L 64 172
    Z
  " fill="url(#cloudGrad)" stroke="#8B949E" stroke-width="3" stroke-linejoin="round"/>

  <!-- LLAMA HEAD — based on Ollama mascot (long muzzle, two long ears, eyes). INSIDE the cloud.
       Centered at (128, 128). Head: top at y~80, muzzle bottom at y~160.
       Two large upright ears at top (banana-curved, leaning slightly outward).
       Elongated face/muzzle (the signature llama feature) — round forehead → narrowing toward snout → wide nostrils. -->
  <g id="llama-head">
    <!-- Left ear: upright, leaning slightly outward (banana-curve) -->
    <path d="M 116 88 C 108 78 104 64 110 56 C 118 60 122 74 122 90 Z"
          fill="#E8D5B7" stroke="#8B7355" stroke-width="3" stroke-linejoin="round"/>
    <!-- Inner left ear (pink, smaller, inside the ear) -->
    <path d="M 115 84 C 111 78 109 70 112 65 C 116 68 118 76 119 86 Z"
          fill="#D4A896" stroke="none"/>
    <!-- Right ear: upright, leaning slightly outward -->
    <path d="M 140 88 C 148 78 152 64 146 56 C 138 60 134 74 134 90 Z"
          fill="#E8D5B7" stroke="#8B7355" stroke-width="3" stroke-linejoin="round"/>
    <!-- Inner right ear (pink) -->
    <path d="M 141 84 C 145 78 147 70 144 65 C 140 68 138 76 137 86 Z"
          fill="#D4A896" stroke="none"/>
    <!-- Head/skull: rounded top, two slight bumps for the forehead/cheeks -->
    <path d="M 128 78
             C 112 78 104 88 102 102
             C 100 116 104 130 112 142
             C 116 148 120 152 128 152
             C 136 152 140 148 144 142
             C 152 130 156 116 154 102
             C 152 88 144 78 128 78 Z"
          fill="#E8D5B7" stroke="#8B7355" stroke-width="3" stroke-linejoin="round"/>
    <!-- Forehead tuft (small tuft of fur on top, between ears) -->
    <path d="M 122 78 C 124 72 126 70 128 70 C 130 70 132 72 134 78
             C 132 76 130 75 128 75 C 126 75 124 76 122 78 Z"
          fill="#8B7355" stroke="none"/>
    <!-- Elongated muzzle: extends down from the head, the signature llama feature.
         Wider at the top (where it joins the head), narrowing to the nose, then widening at the nostrils. -->
    <path d="M 118 138
             C 116 144 116 152 120 158
             C 122 162 126 164 128 164
             C 130 164 134 162 136 158
             C 140 152 140 144 138 138
             C 136 134 132 132 128 132
             C 124 132 120 134 118 138 Z"
          fill="#F0E2C9" stroke="#8B7355" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Nostrils: two small dark ovals at the bottom of the muzzle -->
    <ellipse cx="124" cy="160" rx="1.5" ry="2" fill="#3D2817"/>
    <ellipse cx="132" cy="160" rx="1.5" ry="2" fill="#3D2817"/>
    <!-- Mouth: small line below nostrils -->
    <path d="M 124 162 Q 128 164 132 162" stroke="#3D2817" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Left eye: dark oval (positioned on the upper face, looking forward) -->
    <ellipse cx="118" cy="108" rx="3" ry="4" fill="#3D2817"/>
    <!-- Right eye -->
    <ellipse cx="138" cy="108" rx="3" ry="4" fill="#3D2817"/>
    <!-- Eye highlights (small white dots) -->
    <circle cx="119" cy="106" r="1" fill="#F4F4F4"/>
    <circle cx="139" cy="106" r="1" fill="#F4F4F4"/>
    <!-- Eyebrow tufts (above eyes, slightly angled) -->
    <path d="M 113 100 Q 118 98 123 100" stroke="#8B7355" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 133 100 Q 138 98 143 100" stroke="#8B7355" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Shield overlay (bottom-right, overlapping cloud edge — security accent) -->
  <path d="
    M 172 178
    L 172 206
    C 172 220 186 230 200 234
    C 214 230 228 220 228 206
    L 228 178
    L 200 170
    Z
  " fill="url(#shieldGrad)" stroke="#0D1117" stroke-width="3" stroke-linejoin="round"/>

  <!-- Lock body inside shield -->
  <rect x="190" y="196" width="20" height="16" rx="3" fill="#0D1117"/>
  <!-- Lock shackle -->
  <path d="M 194 196 L 194 190 C 194 186 198 183 200 183 C 202 183 206 186 206 190 L 206 196"
        fill="none" stroke="#0D1117" stroke-width="3" stroke-linecap="round"/>
  <!-- Lock keyhole -->
  <circle cx="200" cy="204" r="2" fill="#3FB950"/>
</svg>
