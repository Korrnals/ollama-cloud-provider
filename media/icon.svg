<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Ollama Cloud Provider icon">
  <!-- Canvas: subtle radial background for depth, transparent-friendly -->
  <defs>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F4F4"/>
      <stop offset="100%" stop-color="#D2D2D2"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3FB950"/>
      <stop offset="100%" stop-color="#1A7F37"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2428"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (Marketplace style) -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bgGrad)"/>

  <!-- Llama head: peeking from behind cloud (drawn before cloud for z-order).
       Original geometric interpretation — not the official Ollama logo.
       Two long banana-curved ears (signature llama feature) + rounded head
       + snout tucking behind the cloud. Recognizable at 16x16 via ear silhouette. -->
  <g id="llama-head">
    <!-- Left ear: long, banana-curved, upright -->
    <path d="M 126 54 C 114 30 114 6 128 2 C 140 12 138 32 142 54 Z"
          fill="#E8D5B7" stroke="#8B7355" stroke-width="3" stroke-linejoin="round"/>
    <!-- Right ear: long, banana-curved, upright, slight outward lean -->
    <path d="M 170 54 C 182 30 182 6 168 2 C 156 12 158 32 154 54 Z"
          fill="#E8D5B7" stroke="#8B7355" stroke-width="3" stroke-linejoin="round"/>
    <!-- Head: rounded, bottom tucks behind cloud -->
    <path d="M 128 52 C 122 38 124 20 140 14 C 158 14 176 22 170 52 C 166 72 156 84 144 84 C 132 84 126 72 128 52 Z"
          fill="#E8D5B7" stroke="#8B7355" stroke-width="3" stroke-linejoin="round"/>
    <!-- Eye (visible on upper face, above cloud line) -->
    <circle cx="148" cy="32" r="3.5" fill="#3D2817"/>
    <!-- Snout hint: darker cream ellipse at bottom (mostly hidden behind cloud) -->
    <ellipse cx="146" cy="76" rx="9" ry="6" fill="#D4B896" stroke="#8B7355" stroke-width="2"/>
  </g>

  <!-- Cloud shape: minimalist, centered -->
  <path d="
    M 96 150
    C 78 150 64 136 64 118
    C 64 102 76 90 92 88
    C 96 70 114 56 134 56
    C 156 56 174 72 178 94
    C 196 96 208 110 208 128
    C 208 144 196 156 180 156
    L 96 156
    Z
  " fill="url(#cloudGrad)" stroke="#8B949E" stroke-width="3" stroke-linejoin="round"/>

  <!-- Shield overlay (lower-right of cloud, security accent) -->
  <path d="
    M 168 168
    L 168 198
    C 168 214 184 224 200 228
    C 216 224 232 214 232 198
    L 232 168
    L 200 160
    Z
  " fill="url(#shieldGrad)" stroke="#0D1117" stroke-width="3" stroke-linejoin="round"/>

  <!-- Lock body inside shield -->
  <rect x="190" y="188" width="20" height="16" rx="3" fill="#0D1117"/>
  <!-- Lock shackle -->
  <path d="M 194 188 L 194 182 C 194 178 198 175 200 175 C 202 175 206 178 206 182 L 206 188"
        fill="none" stroke="#0D1117" stroke-width="3" stroke-linecap="round"/>
  <!-- Lock keyhole -->
  <circle cx="200" cy="196" r="2" fill="#3FB950"/>
</svg>
