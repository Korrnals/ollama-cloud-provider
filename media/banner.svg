<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Ollama Cloud Provider banner">
  <defs>
    <linearGradient id="bgGradB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1F2428"/>
    </linearGradient>
    <linearGradient id="cloudGradB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F4F4"/>
      <stop offset="100%" stop-color="#D2D2D2"/>
    </linearGradient>
    <linearGradient id="shieldGradB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3FB950"/>
      <stop offset="100%" stop-color="#1A7F37"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="320" rx="24" ry="24" fill="url(#bgGradB)"/>

  <!-- Llama icon group (left third) -->
  <g transform="translate(40, 40) scale(0.95)">
    <path d="
      M 56 192
      C 30 192 14 176 14 156
      C 14 138 28 124 48 122
      C 52 100 76 86 104 86
      C 128 86 148 100 156 122
      C 180 122 200 138 204 160
      C 224 162 240 174 240 192
      C 240 200 234 206 226 206
      L 56 206
      C 50 206 56 198 56 192
      Z
    " fill="url(#cloudGradB)" stroke="#8B949E" stroke-width="3" stroke-linejoin="round"/>
    <image href="icons_lama.png" x="64" y="76" width="148" height="148" preserveAspectRatio="xMidYMid meet"/>
    <path d="M 172 178 L 172 206 C 172 220 186 230 200 234 C 214 230 228 220 228 206 L 228 178 L 200 170 Z"
          fill="url(#shieldGradB)" stroke="#0D1117" stroke-width="3" stroke-linejoin="round"/>
    <rect x="190" y="196" width="20" height="16" rx="3" fill="#0D1117"/>
    <path d="M 194 196 L 194 190 C 194 186 198 183 200 183 C 202 183 206 186 206 190 L 206 196"
          fill="none" stroke="#0D1117" stroke-width="3" stroke-linecap="round"/>
    <circle cx="200" cy="204" r="2" fill="#3FB950"/>
  </g>

  <!-- Text (right two-thirds) -->
  <text x="320" y="130" font-family="Segoe UI, system-ui, sans-serif" font-size="56" font-weight="700" fill="#F4F4F4">Ollama Cloud Provider</text>
  <text x="320" y="180" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="400" fill="#8B949E">Native VS Code chat integration for Ollama Cloud</text>
  <text x="320" y="220" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="500" fill="#3FB950">✓ Secure by design  ✓ MIT licensed  ✓ Fork of Ollama-Cloud-for-Copilot</text>
</svg>
